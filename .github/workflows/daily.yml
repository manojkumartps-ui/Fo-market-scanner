name: NSE F&O Update

on:
  schedule:
    - cron: '0 15 * * 1-5'   # keep your timing
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'   # IMPORTANT: quoted

    - uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip

    - run: pip install pandas==2.2.2 yfinance==0.2.40 requests==2.31.0

    - run: python update.py

    - run: |
        git config user.name github-actions
        git config user.email actions@github.com
        git add data/nse_fno_ohlc.csv
        git commit -m "NSE F&O update $(date +'%Y-%m-%d')" || echo "no changes"
        git push
