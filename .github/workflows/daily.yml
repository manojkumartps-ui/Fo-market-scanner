name: NSE F&O Update

on:
  schedule:
    - cron: '0 15 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Cache pip
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip

    - name: Install dependencies
      run: pip install pandas==2.2.2 yfinance==0.2.40 requests==2.31.0

    - name: Run update script
      run: python update.py

    - name: Commit and push changes
      run: |
        git config user.name github-actions
        git config user.email actions@github.com
        git add data/nse_fno_ohlc.csv
        git commit -m "NSE F&O update $(date +'%Y-%m-%d')" || echo "no changes"
        git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
